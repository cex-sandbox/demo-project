# Demo workload cho GitOps — Argo CD sync từ Git xuống cluster.
# securityContext hardened theo đúng rule k8s của security-template:
# non-root, readOnlyRootFilesystem, drop ALL caps, no privilege escalation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: demo
  labels: { app: demo-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: demo-web }
  template:
    metadata:
      labels: { app: demo-web }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: demo
spec:
  selector: { app: demo-web }
  ports:
    - { port: 80, targetPort: 8080 }
